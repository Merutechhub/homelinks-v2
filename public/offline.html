<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Homelink - Offline</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto',
          'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans',
          'Helvetica Neue', sans-serif;
        background: linear-gradient(135deg, #f9fafb 0%, #f3f4f6 100%);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 20px;
      }

      @media (prefers-color-scheme: dark) {
        body {
          background: linear-gradient(135deg, #111827 0%, #030712 100%);
        }
      }

      .offline-container {
        text-align: center;
        background: white;
        padding: 40px;
        border-radius: 12px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        max-width: 400px;
      }

      @media (prefers-color-scheme: dark) {
        .offline-container {
          background: #1f2937;
        }
      }

      .logo {
        width: 64px;
        height: 64px;
        background: linear-gradient(135deg, #6b54ff 0%, #2dd4bf 100%);
        border-radius: 8px;
        margin: 0 auto 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        font-weight: bold;
        color: white;
      }

      h1 {
        font-size: 24px;
        margin-bottom: 12px;
        color: #111827;
      }

      @media (prefers-color-scheme: dark) {
        h1 {
          color: #f9fafb;
        }
      }

      p {
        color: #6b7280;
        margin-bottom: 24px;
        line-height: 1.6;
      }

      @media (prefers-color-scheme: dark) {
        p {
          color: #d1d5db;
        }
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 16px;
        background: #fef3c7;
        border-radius: 8px;
        font-size: 14px;
        color: #92400e;
        margin-bottom: 24px;
      }

      @media (prefers-color-scheme: dark) {
        .status {
          background: #78350f;
          color: #fcd34d;
        }
      }

      .dot {
        width: 8px;
        height: 8px;
        background: currentColor;
        border-radius: 50%;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.5;
        }
      }

      .tips {
        text-align: left;
        background: #f3f4f6;
        padding: 16px;
        border-radius: 8px;
        margin-top: 24px;
      }

      @media (prefers-color-scheme: dark) {
        .tips {
          background: #374151;
        }
      }

      .tips h3 {
        font-size: 12px;
        font-weight: 600;
        text-transform: uppercase;
        color: #6b7280;
        margin-bottom: 8px;
      }

      @media (prefers-color-scheme: dark) {
        .tips h3 {
          color: #9ca3af;
        }
      }

      .tips ul {
        list-style: none;
        font-size: 13px;
        color: #6b7280;
      }

      @media (prefers-color-scheme: dark) {
        .tips ul {
          color: #d1d5db;
        }
      }

      .tips li {
        margin-bottom: 6px;
      }

      .tips li:before {
        content: '• ';
        color: #6b54ff;
        font-weight: bold;
        margin-right: 6px;
      }
    </style>
  </head>
  <body>
    <div class="offline-container">
      <div class="logo">📡</div>
      <h1>You're Offline</h1>
      <p>Looks like your internet connection is down. Don't worry, you can still access some content.</p>

      <div class="status">
        <div class="dot"></div>
        Waiting for connection...
      </div>

      <div class="tips">
        <h3>Try:</h3>
        <ul>
          <li>Check your WiFi or mobile data</li>
          <li>Move closer to your WiFi router</li>
          <li>Restart your connection</li>
          <li>Refresh this page when online</li>
        </ul>
      </div>
    </div>

    <script>
      // Redirect when connection is back
      window.addEventListener('online', () => {
        window.location.reload();
      });

      // Check connection periodically
      setInterval(() => {
        fetch('/', { method: 'HEAD', cache: 'no-store' })
          .then(() => {
            window.location.reload();
          })
          .catch(() => {
            // Still offline
          });
      }, 5000);
    </script>
  </body>
</html>
